name: Article Actualités hebdomadaire

on:
  schedule:
    # Chaque lundi à 08:00 UTC (09:00 Paris en hiver, 10:00 en été)
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      topic_hint:
        description: "Indice optionnel de sujet (laisser vide pour libre choix)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "expat-malaga-bot"
          git config user.email "bot@expat-malaga.com"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm i -g @anthropic-ai/claude-code

      - name: Run content-writer agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_HINT: ${{ github.event.inputs.topic_hint }}
        run: |
          WEEK_TAG="$(date +%Y-W%V)"
          BRANCH="content/actualites-${WEEK_TAG}"
          git checkout -b "$BRANCH"

          PROMPT="Rédige l'article Actualités de la semaine ${WEEK_TAG}. Respecte strictement le brief. Vérifie d'abord content/actualites/ pour éviter les doublons."
          if [ -n "$TOPIC_HINT" ]; then
            PROMPT="$PROMPT Indice de sujet fourni par l'équipe : $TOPIC_HINT"
          fi

          claude --agent content-writer --print "$PROMPT"

          if [ -z "$(git status --porcelain content/actualites/)" ]; then
            echo "Aucun article généré."
            exit 1
          fi

          git add content/actualites/
          git commit -m "content(actualites): article hebdo ${WEEK_TAG} [auto]"
          git push origin "$BRANCH"

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Open pull request for human review
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "Actualités hebdo — $(date +%Y-W%V)" \
            --body "Article généré automatiquement par content-writer. À relire avant merge."
